name: Automate Data Preprocessing

# Workflow ini akan berjalan otomatis setiap ada push ke branch main
on:
  push:
    branches:
      - main

jobs:
  preprocessing:
    runs-on: ubuntu-latest

    steps:
      # 1. Mengambil kode dan data dari repositori kamu
      - name: Checkout repository
        uses: actions/checkout@v3

      # 2. Menyiapkan environment Python
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      # 3. Menginstal library yang dibutuhkan
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pandas scikit-learn

      # 4. Menjalankan skrip preprocessing yang ada di folder preprocessing/
      - name: Run preprocessing script
        run: python preprocessing/automate_Nama-siswa.py

      # 5. Menyimpan (commit) dataset hasil preprocessing kembali ke repositori
      - name: Commit and push generated dataset
        run: |
          git config --global user.name 'github-actions[bot]'
          git config --global user.email 'github-actions[bot]@users.noreply.github.com'
          git add telco_churn_preprocessed.csv
          git commit -m "Auto-generate preprocessed data" || echo "No changes to commit"
          git push
